<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Tier 9 Game Studios &mdash; Auto Battles Online</title>
    <meta name="description" content="Tier 9 Game Studios — makers of Auto Battles Online, the idle RPG. Download on the App Store or Google Play, join our Discord, or come work with us."/>
    <meta property="og:title" content="Tier 9 Game Studios"/>
    <meta property="og:description" content="Makers of Auto Battles Online — Idle RPG. Download on the App Store or Google Play, and join our Discord community."/>
    <meta property="og:type" content="website"/>
    <meta property="og:url" content="https://www.tier9studios.com/"/>
    <meta property="og:image" content="https://www.tier9studios.com/assets/bg.jpg"/>
    <meta name="theme-color" content="#8ed0ef"/>
    <link rel="icon" type="image/png" href="/assets/logo.png"/>
    <style>
        :root {
            --ink: #1a1c23;
            --ink-dim: #3d414c;
            --accent: #e8434f;
            --blurple: #5865f2;
        }
        @font-face {
            font-family: "Ioskeley Mono";
            src: url("/assets/fonts/IoskeleyMonoTerm-Regular.woff2") format("woff2");
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: "Ioskeley Mono";
            src: url("/assets/fonts/IoskeleyMonoTerm-SemiBold.woff2") format("woff2");
            font-weight: 600;
            font-display: swap;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            background: #8ed0ef;
            color: var(--ink);
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }
        .bg {
            position: fixed;
            inset: -24px; /* oversize so the blur doesn't show bright edges */
            z-index: -1;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            filter: blur(3px);
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
        }
        .bg::after {
            content: "";
            position: absolute;
            inset: 24px;
            background: var(--bg-image) center / 140% auto no-repeat;
            opacity: 0;
        }
        .bg.active { opacity: 1; }
        /* Fixed scrim behind the footer so its text stays readable on any artwork. */
        body::after {
            content: "";
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 7rem;
            z-index: -1;
            pointer-events: none;
            background: linear-gradient(to top, rgba(6, 26, 48, 0.6), rgba(6, 26, 48, 0));
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1.25rem;
        }
        .glass {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 34rem;
            padding: 3rem 2.5rem 2.5rem;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.66);
            -webkit-backdrop-filter: blur(16px) saturate(1.3);
            backdrop-filter: blur(16px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 0 16px 48px rgba(10, 45, 80, 0.22);
        }
        @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
            .glass { background: rgba(255, 255, 255, 0.93); }
        }
        .logo {
            width: min(300px, 68vw);
            height: auto;
            margin-bottom: 2rem;
        }
        h1 {
            margin: 0 0 0.4rem;
            font-family: "Ioskeley Mono", ui-monospace, monospace;
            font-size: clamp(1.5rem, 4.5vw, 1.9rem);
            font-weight: 600;
            line-height: 1.15;
            letter-spacing: -0.01em;
        }
        .tagline {
            margin: 0 0 2rem;
            color: var(--ink-dim);
            font-size: 1.02rem;
            font-weight: 500;
            max-width: 28rem;
        }
        .badges {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
        }
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 10.25rem;
            height: 50px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.35);
            color: #ffffff;
            text-decoration: none;
        }
        .badge-store { background: #000000; }
        .badge-discord { background: var(--blurple); }
        .badge svg {
            width: 26px;
            height: 26px;
            flex: none;
            fill: currentColor;
        }
        .badge .lines {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.15;
        }
        .badge .small {
            font-size: 0.6rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .badge .big {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .hiring {
            margin-top: 2rem;
            display: inline-block;
            padding: 0.35rem 1rem;
            border: 1px solid var(--ink-dim);
            border-radius: 999px;
            color: var(--ink-dim);
            font-family: "Ioskeley Mono", ui-monospace, monospace;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
        }
        .hiring:hover {
            color: var(--accent);
            border-color: var(--accent);
        }
        footer {
            padding: 0 1.5rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.3rem 1.25rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 1px 6px rgba(5, 35, 65, 0.45);
        }
        footer a {
            color: rgba(255, 255, 255, 0.92);
            text-decoration: none;
        }
        footer a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .badge { height: 42px; }
            .badge .big { font-size: 1rem; }
        }
        @media (max-aspect-ratio: 3 / 4) {
            .bg::after { opacity: 0.34; }
            main { padding: clamp(1rem, 3.5vh, 2rem) 0; }
            .glass {
                width: min(84vw, 30rem);
                padding: clamp(1.4rem, 3.5vh, 2.25rem) clamp(0.9rem, 4vw, 1.5rem) clamp(1.2rem, 3vh, 1.75rem);
                border-radius: clamp(16px, 5vw, 22px);
            }
            .logo {
                width: clamp(10rem, 55vw, 14rem);
                margin-bottom: clamp(1rem, 2.5vh, 1.5rem);
            }
            h1 { font-size: clamp(1.3rem, 5.5vw, 1.65rem); }
            .tagline {
                margin-bottom: clamp(1.1rem, 3vh, 1.5rem);
                font-size: clamp(0.9rem, 3.8vw, 0.98rem);
            }
            .badges {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
                width: 100%;
                /* Cap at two badge widths + gap so badges never stretch wider than designed. */
                max-width: calc(20.5rem + 0.55rem);
                gap: 0.55rem;
            }
            .badge {
                width: 100%;
                height: clamp(38px, 10.5vw, 44px);
                gap: 0.4rem;
            }
            .badge-discord {
                grid-column: 1 / -1;
                justify-self: center;
                width: calc(50% - 0.275rem);
            }
            .badge svg { width: 22px; height: 22px; }
            .badge .small { font-size: 0.52rem; }
            .badge .big { font-size: 0.95rem; }
            .hiring {
                margin-top: clamp(1.1rem, 3vh, 1.5rem);
                font-size: 0.84rem;
            }
            footer {
                padding: 0 1rem max(1rem, env(safe-area-inset-bottom));
                font-size: 0.8rem;
            }
        }
        @media (max-width: 350px) and (max-aspect-ratio: 3 / 4) {
            .glass { width: 90vw; }
            .badges {
                grid-template-columns: minmax(0, 10rem);
                justify-content: center;
            }
            .badge-discord {
                grid-column: auto;
                width: 100%;
            }
        }
        @media (max-height: 600px) and (min-aspect-ratio: 4 / 3) {
            main { padding: 0.75rem 1rem; }
            .glass { max-width: 34rem; padding: 1rem 1.5rem 0.9rem; }
            .logo {
                width: min(150px, 22vw);
                margin-bottom: 0.5rem;
            }
            h1 { font-size: 1.25rem; }
            .tagline {
                margin-bottom: 0.75rem;
                font-size: 0.85rem;
            }
            .badges { gap: 0.5rem; }
            .badge {
                width: 9.5rem;
                height: 36px;
                gap: 0.4rem;
            }
            .badge svg { width: 21px; height: 21px; }
            .badge .small { font-size: 0.5rem; }
            .badge .big { font-size: 0.9rem; }
            .hiring {
                margin-top: 0.75rem;
                padding: 0.2rem 0.8rem;
                font-size: 0.8rem;
            }
            footer {
                padding-bottom: 0.5rem;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg active" style="--bg-image: url('/assets/bg.jpg')"></div>
    <div class="bg" style="--bg-image: url('/assets/bg-arena.jpg')"></div>
    <div class="bg" style="--bg-image: url('/assets/bg-dungeon.jpg')"></div>
    <main>

            <img class="logo" src="/assets/logo.png" alt="Tier 9 Game Studios" width="900" height="648"/>

            </div>
            <a class="hiring" href="https://tier-9-game-studios-ltd.breezy.hr/">We&rsquo;re hiring!</a>

    </main>
    <footer>
        <span>&copy; Tier 9 Game Studios Ltd.</span>
        <a href="/privacy/">Privacy</a>
        <a href="https://tier-9-game-studios-ltd.breezy.hr/">Careers</a>
    </footer>
    <script>
        // Slow crossfade between background artworks. A pure opacity dissolve,
        // so it stays on even when the OS requests reduced motion.
        (function () {
            var layers = document.querySelectorAll(".bg");
            if (layers.length < 2) return;
            var i = 0;
            setInterval(function () {
                var prev = layers[i];
                i = (i + 1) % layers.length;
                layers[i].classList.add("active");
                // Drop the old layer only after the new one is fully opaque.
                setTimeout(function () { prev.classList.remove("active"); }, 2600);
            }, 9000);
        })();
    </script>
