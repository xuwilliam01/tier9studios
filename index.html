<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Tier 9 Game Studios &mdash; Auto Battles Online</title>
    <meta name="description" content="Tier 9 Game Studios — makers of Auto Battles Online, the idle RPG. Download on the App Store or Google Play, join our Discord, or come work with us."/>
    <meta property="og:title" content="Tier 9 Game Studios"/>
    <meta property="og:description" content="Makers of Auto Battles Online — Idle RPG. Download on the App Store or Google Play, and join our Discord community."/>
    <meta property="og:type" content="website"/>
    <meta property="og:url" content="https://www.tier9studios.com/"/>
    <meta property="og:image" content="https://www.tier9studios.com/assets/bg.jpg"/>
    <meta name="theme-color" content="#8ed0ef"/>
    <link rel="icon" type="image/png" href="/assets/logo.png"/>
    <style>
        :root {
            --ink: #1a1c23;
            --ink-dim: #50545f;
            --accent: #e8434f;
            --blurple: #5865f2;
        }
        @font-face {
            font-family: "Ioskeley Mono";
            src: url("/assets/fonts/IoskeleyMonoTerm-Regular.woff2") format("woff2");
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: "Ioskeley Mono";
            src: url("/assets/fonts/IoskeleyMonoTerm-SemiBold.woff2") format("woff2");
            font-weight: 600;
            font-display: swap;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            margin: 0;
            background: #8ed0ef;
            color: var(--ink);
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .bg {
            position: fixed;
            inset: -24px; /* oversize so the blur doesn't show bright edges */
            z-index: -1;
            background-size: cover;
            background-position: center;
            filter: blur(6px);
            opacity: 0;
            transition: opacity 2.5s ease-in-out;
        }
        .bg.active { opacity: 1; }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1.25rem;
        }
        .glass {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 34rem;
            padding: 3rem 2.5rem 2.5rem;
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.66);
            -webkit-backdrop-filter: blur(16px) saturate(1.3);
            backdrop-filter: blur(16px) saturate(1.3);
            border: 1px solid rgba(255, 255, 255, 0.65);
            box-shadow: 0 16px 48px rgba(10, 45, 80, 0.22);
        }
        @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
            .glass { background: rgba(255, 255, 255, 0.93); }
        }
        .logo {
            width: min(300px, 68vw);
            height: auto;
            margin-bottom: 2rem;
        }
        h1 {
            margin: 0 0 0.4rem;
            font-family: "Ioskeley Mono", ui-monospace, monospace;
            font-size: clamp(1.5rem, 4.5vw, 1.9rem);
            font-weight: 600;
            line-height: 1.15;
            letter-spacing: -0.01em;
        }
        .tagline {
            margin: 0 0 2rem;
            color: var(--ink-dim);
            font-size: 1.02rem;
            max-width: 28rem;
        }
        .badges {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
        }
        .badges img { display: block; height: 50px; width: auto; }
        .badge-discord {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            height: 50px;
            padding: 0 1.1rem;
            border-radius: 8px;
            background: var(--blurple);
            color: #ffffff;
            text-decoration: none;
        }
        .badge-discord svg {
            width: 26px;
            height: 26px;
            flex: none;
            fill: currentColor;
        }
        .badge-discord .lines {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.15;
        }
        .badge-discord .small {
            font-size: 0.6rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .badge-discord .big {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }
        .hiring {
            margin-top: 2rem;
            display: inline-block;
            padding: 0.35rem 1rem;
            border: 1px solid var(--ink-dim);
            border-radius: 999px;
            color: var(--ink-dim);
            font-family: "Ioskeley Mono", ui-monospace, monospace;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .hiring:hover {
            color: var(--accent);
            border-color: var(--accent);
        }
        footer {
            padding: 0 1.5rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.3rem 1.25rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 1px 6px rgba(5, 35, 65, 0.45);
        }
        footer a {
            color: rgba(255, 255, 255, 0.92);
            text-decoration: none;
        }
        footer a:hover { text-decoration: underline; }
        @media (max-width: 480px) {
            .glass { padding: 2.25rem 1.25rem 2rem; }
            .badges img, .badge-discord { height: 44px; }
            .badge-discord .big { font-size: 1.05rem; }
        }
    </style>
</head>
<body>
    <div class="bg active" style="background-image: url('/assets/bg.jpg')"></div>
    <div class="bg" style="background-image: url('/assets/bg-arena.jpg')"></div>
    <div class="bg" style="background-image: url('/assets/bg-dungeon.jpg')"></div>
    <main>
        <div class="glass">
            <img class="logo" src="/assets/logo.png" alt="Tier 9 Game Studios" width="900" height="648"/>
            <h1>Auto Battles Online</h1>
            <p class="tagline">An idle RPG. Battle, loot, and level up &mdash; even while you&rsquo;re away.</p>
            <div class="badges">
                <a href="https://apps.apple.com/sa/app/auto-battles-online-idle-rpg/id1536993948">
                    <img src="/assets/app-store-badge.svg" alt="Download on the App Store"/>
                </a>
                <a href="https://play.google.com/store/apps/details?id=com.william.mobilegame&amp;hl=en_US">
                    <img src="/assets/google-play-badge.png" alt="Get it on Google Play"/>
                </a>
                <a class="badge-discord" href="https://discord.gg/pKbKFXm2xz">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.32 4.37a19.8 19.8 0 0 0-4.89-1.52.07.07 0 0 0-.08.04c-.21.38-.44.87-.6 1.25a18.3 18.3 0 0 0-5.49 0 12.6 12.6 0 0 0-.61-1.25.08.08 0 0 0-.08-.04 19.7 19.7 0 0 0-4.88 1.52.07.07 0 0 0-.04.03C.53 9.05-.32 13.58.1 18.06c0 .02.01.04.03.05a19.9 19.9 0 0 0 5.99 3.03.08.08 0 0 0 .09-.03c.46-.63.87-1.3 1.23-2a.08.08 0 0 0-.04-.11 13 13 0 0 1-1.87-.9.08.08 0 0 1-.01-.12c.13-.1.25-.19.37-.29a.07.07 0 0 1 .08-.01c3.93 1.79 8.18 1.79 12.06 0a.07.07 0 0 1 .08.01c.12.1.25.2.37.29a.08.08 0 0 1-.01.13c-.6.35-1.22.64-1.87.89a.08.08 0 0 0-.04.11c.36.7.78 1.37 1.23 2a.08.08 0 0 0 .08.03 19.8 19.8 0 0 0 6.01-3.03.08.08 0 0 0 .03-.05c.5-5.18-.84-9.67-3.55-13.66a.06.06 0 0 0-.03-.03zM8.02 15.33c-1.18 0-2.16-1.08-2.16-2.42 0-1.33.96-2.42 2.16-2.42 1.21 0 2.18 1.1 2.16 2.42 0 1.34-.96 2.42-2.16 2.42zm7.97 0c-1.18 0-2.15-1.08-2.15-2.42 0-1.33.95-2.42 2.15-2.42 1.21 0 2.18 1.1 2.16 2.42 0 1.34-.95 2.42-2.16 2.42z"/></svg>
                    <span class="lines"><span class="small">Join us on</span><span class="big">Discord</span></span>
                </a>
            </div>
            <a class="hiring" href="https://tier-9-game-studios-ltd.breezy.hr/">We&rsquo;re hiring!</a>
        </div>
    </main>
    <footer>
        <span>&copy; Tier 9 Game Studios Ltd.</span>
        <a href="/privacy/">Privacy</a>
        <a href="https://tier-9-game-studios-ltd.breezy.hr/">Careers</a>
    </footer>
    <script>
        // Slow crossfade between background artworks. Static for users who
        // prefer reduced motion.
        (function () {
            var layers = document.querySelectorAll(".bg");
            if (layers.length < 2) return;
            if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
            var i = 0;
            setInterval(function () {
                var prev = layers[i];
                i = (i + 1) % layers.length;
                layers[i].classList.add("active");
                // Drop the old layer only after the new one is fully opaque.
                setTimeout(function () { prev.classList.remove("active"); }, 2600);
            }, 9000);
        })();
    </script>
</body>
</html>
