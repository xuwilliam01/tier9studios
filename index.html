<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Auto Battles Online &mdash; Tier 9 Game Studios</title>
    <meta name="description" content="Auto Battles Online — Idle RPG by Tier 9 Game Studios. Download on the App Store or Google Play, and join our Discord community."/>
    <meta property="og:title" content="Auto Battles Online — Idle RPG"/>
    <meta property="og:description" content="Download Auto Battles Online on the App Store or Google Play, and join our Discord community."/>
    <meta property="og:type" content="website"/>
    <meta property="og:url" content="https://www.tier9studios.com/"/>
    <style>
        :root {
            --bg: #faf9f5;
            --panel: #ffffff;
            --panel-2: #f0eee6;
            --border: #e3e0d4;
            --ink: #3d3929;
            --ink-dim: #6b6657;
            --accent: #cc785c;
            --accent-2: #d97757;
            --accent-deep: #a8553d;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--ink);
            font-family: Arial, Helvetica, sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3em 1.5em;
        }
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3em 2.5em;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 12px rgba(61, 57, 41, 0.06);
        }
        .studio {
            font-size: 0.85em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink-dim);
            margin: 0 0 0.75em;
        }
        h1 {
            font-size: 1.9em;
            line-height: 1.2;
            margin: 0 0 0.35em;
        }
        .tagline {
            color: var(--ink-dim);
            margin: 0 0 2em;
        }
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 0.85em;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6em;
            padding: 0.9em 1.4em;
            border-radius: 10px;
            font-size: 1.05em;
            font-weight: bold;
            text-decoration: none;
            border: 1px solid var(--border);
            background: var(--panel-2);
            color: var(--ink);
            transition: background 0.15s, border-color 0.15s;
        }
        .btn:hover {
            background: var(--border);
        }
        .btn.discord {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }
        .btn.discord:hover {
            background: var(--accent-deep);
            border-color: var(--accent-deep);
        }
        .btn svg {
            width: 22px;
            height: 22px;
            flex: none;
            fill: currentColor;
        }
        footer {
            text-align: center;
            padding: 1.5em;
            font-size: 0.85em;
            color: var(--ink-dim);
        }
        footer a {
            color: var(--ink-dim);
        }
    </style>
</head>
